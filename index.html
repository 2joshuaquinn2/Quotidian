<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>enter</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: monospace;
  }
  canvas {
    display: block;
  }
  .title {
    position: absolute;
    top: 45%;
    width: 100%;
    text-align: center;
    font-size: 2.5em;
    cursor: pointer;
    transition: 0.3s;
  }
  .title:hover {
    letter-spacing: 10px;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="title" onclick="enterSite()">JOSHUA QUINN</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script>
let t = 0;

function setup() {
  createCanvas(window.innerWidth, window.innerHeight);
}

function draw() {
  background(0, 25);

  translate(width/2, height/2);

  noFill();
  stroke(255);

  let mouseInfluenceX = map(mouseX, 0, width, -2, 2);
  let mouseInfluenceY = map(mouseY, 0, height, -2, 2);

  beginShape();
  for (let a = 0; a < TWO_PI; a += 0.1) {
    let noiseFactor = noise(a + t, mouseInfluenceX, mouseInfluenceY);
    let r = 200 + sin(a * 3 + t) * 50 + noiseFactor * 120;

    let x = r * cos(a);
    let y = r * sin(a);

    vertex(x, y);
  }
  endShape(CLOSE);

  t += 0.01;
}

function enterSite() {
  window.location.href = "audiovisual.html";
}
</script>

</body>
</html>
