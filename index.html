<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>your name</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: monospace;
  }
  canvas {
    display: block;
  }
  .title {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 2em;
    mix-blend-mode: difference;
  }
</style>
</head>
<body>

<div class="title">enter</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script>
let t = 0;

function setup() {
  createCanvas(window.innerWidth, window.innerHeight);
}

function draw() {
  background(0, 20);

  translate(width/2, height/2);

  noFill();
  stroke(255);

  beginShape();
  for (let a = 0; a < TWO_PI; a += 0.1) {
    let r = 200 + sin(a * 3 + t) * 50 + noise(a + t) * 100;
    let x = r * cos(a);
    let y = r * sin(a);
    vertex(x, y);
  }
  endShape(CLOSE);

  t += 0.01;
}
</script>

</body>
</html>
