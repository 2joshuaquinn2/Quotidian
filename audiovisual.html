<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JOSHUA QUINN</title>

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: monospace;
    overflow-x: hidden;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
  }

  .center-text {
    position: relative;
    z-index: 1;
    height: 150vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .title {
    font-size: 10vw;
    line-height: 0.9;
    letter-spacing: 5px;
    position: relative;
  }

  .title span {
    display: block;
  }

  /* glitch layers */
  .title::before,
  .title::after {
    content: "AUDIO / VISUAL";
    position: absolute;
    left: 0;
    width: 100%;
    opacity: 0.6;
  }

  .title::before {
    color: red;
    animation: glitch1 1.5s infinite;
  }

  .title::after {
    color: blue;
    animation: glitch2 1.5s infinite;
  }

  @keyframes glitch1 {
    0% { transform: translate(0,0); }
    50% { transform: translate(-5px,-3px); }
    100% { transform: translate(0,0); }
  }

  @keyframes glitch2 {
    0% { transform: translate(0,0); }
    50% { transform: translate(5px,3px); }
    100% { transform: translate(0,0); }
  }

  .content {
    position: relative;
    z-index: 1;
    padding: 100px;
    font-size: 1.2em;
  }
</style>

</head>
<body>

<div class="center-text">
  <div class="title">
    <span>AUDIO</span>
    <span>/</span>
    <span>VISUAL</span>
  </div>
</div>

<div class="content">
  <p>[ your music here ]</p>
  <p>[ your poetry here ]</p>
  <p>[ more content ]</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script>
let t = 0;

function setup() {
  let cnv = createCanvas(window.innerWidth, window.innerHeight);
  cnv.parent(document.body);
}

function draw() {
  background(0, 30);

  // LEFT SIDE BLOB
  push();
  translate(width * 0.2, height / 2);
  drawBlob(150, 0.8);
  pop();

  // RIGHT SIDE BLOB
  push();
  translate(width * 0.8, height / 2);
  drawBlob(150, 1.2);
  pop();

  t += 0.01;
}

function drawBlob(size, speed) {
  noFill();
  stroke(255);

  beginShape();
  for (let a = 0; a < TWO_PI; a += 0.1) {
    let r = size + sin(a * 3 + t * speed) * 40 + noise(a + t) * 80;

    let x = r * cos(a);
    let y = r * sin(a);

    vertex(x, y);
  }
  endShape(CLOSE);
}

function windowResized() {
  resizeCanvas(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
