<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>audiovisual</title>
<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: monospace;
    overflow-x: hidden;
  }

  .section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2em;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .glitch {
    position: relative;
  }

  .glitch::before,
  .glitch::after {
    content: "AUDIOVISUAL";
    position: absolute;
    left: 0;
    width: 100%;
    opacity: 0.7;
  }

  .glitch::before {
    color: red;
    animation: glitchTop 1s infinite;
  }

  .glitch::after {
    color: blue;
    animation: glitchBottom 1s infinite;
  }

  @keyframes glitchTop {
    0% { transform: translate(0,0); }
    50% { transform: translate(-2px,-2px); }
    100% { transform: translate(0,0); }
  }

  @keyframes glitchBottom {
    0% { transform: translate(0,0); }
    50% { transform: translate(2px,2px); }
    100% { transform: translate(0,0); }
  }
</style>
</head>
<body>

<div class="section glitch">AUDIOVISUAL</div>

<div class="section">[ your music here ]</div>
<div class="section">[ your poetry here ]</div>
<div class="section">[ more content ]</div>

</body>
</html>
